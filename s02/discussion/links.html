<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>HTML - Hyperlinks</title>
	</head>

	<body>
		<h1>HTML Hyperlinks</h1>
		<p><meta charset="utf-8">HTML Hyperlinks are created using the anchor tag.</p>

		<h3>There are two kinds of links:</h3>

		<!-- unordered list create bulleted list -->
		<ul>
			<li>Absolute link</li>
			<li>Relative link</li>
		</ul>

		<div>
			<!-- Absolute Links are links to pages in other websites (in internet) -->

			<h4>Absolute link</h4>
			<a href="https://zuitt.co/" target="_blank">Zuitt Coding Bootcamp</a> <br/>
			<a href="https://www.linkedin.com/login" target="_blank">Linkedin</a>
		</div>

		<div>
			<!-- Relative Links are local links (html files)-->
			<h4>Relative Links</h4>
			<a href=".\attributes.html">Attribute Page</a> <br/>
			<a href=".\links.html">Links Page</a> <br/>
			<a href=".\index.html">Home Page</a>
		</div>

		<div>
			<br>
			<img src="./picture1.png">
			<br>
			<img src="./picture2.png">
			<br>
			<img src="./picture3.png">
			<br>
		</div>

		<a href="#top">Return to top</a>
	</body>
</html>
